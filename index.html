<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARUOKO · Hiroshima Okonomiyaki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    /* ========== CONFIG ========== */
    :root {
      --accent: #D6B6AE;
      --accent-hover: #c9a49b;
      --brand: #8E2124;
      --bg: #F4F0E8;
      --bg-card: #FFFFFF;
      --text: #4A433F;
      --text-light: #D5D1CB;
      --text-muted: #9A938D;
      --border: #E0D9D0;
      --success: #3A7D44;
      --success-light: #E8F5E9;
      --danger: #C0392B;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 1px 8px rgba(74, 67, 63, 0.06);
      --shadow-lg: 0 4px 24px rgba(74, 67, 63, 0.10);
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-display: 'Playfair Display', Georgia, serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== LAYOUT ========== */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 24px 120px;
    }

    /* ========== HEADER ========== */
    .header {
      text-align: center;
      padding: 32px 0 16px;
    }
    .header-logo {
      width: 220px;
      height: auto;
      margin-bottom: 10px;
    }
    .header .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 0;
      line-height: 1.4;
    }

    /* ========== STEPPER ========== */
    .stepper {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s ease;
    }
    .step-dot.active {
      background: var(--accent);
      width: 24px;
      border-radius: 5px;
    }
    .step-dot.done {
      background: var(--brand);
    }

    /* ========== SECTIONS ========== */
    .section { display: none; }
    .section.active {
      display: block;
      animation: fadeUp 0.35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--brand);
      margin-bottom: 2px;
    }
    .section-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* ========== MENU CATEGORIES ========== */
    .menu-category {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin: 20px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1.5px solid var(--border);
    }
    .menu-category:first-child { margin-top: 0; }

    /* ========== MENU ITEMS ========== */
    .menu-item {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }
    .menu-item.selected {
      border-color: var(--brand);
      background: #f9f0ef;
    }
    .menu-item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .menu-item-name {
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
    }
    .menu-item-price {
      font-weight: 700;
      color: var(--brand);
      font-size: 16px;
      white-space: nowrap;
      margin-left: 12px;
    }
    .menu-item-desc {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    /* Quantity control */
    .qty-control {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .qty-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .qty-btn:active {
      transform: scale(0.92);
    }
    .qty-btn.minus { color: var(--text-light); border-color: var(--text-light); }
    .qty-btn.minus.active { color: var(--brand); border-color: var(--brand); }
    .qty-btn.plus { color: var(--brand); border-color: var(--brand); }
    .qty-value {
      font-weight: 700;
      font-size: 18px;
      min-width: 24px;
      text-align: center;
    }

    /* ========== TIME SLOTS ========== */
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .slot-btn {
      padding: 14px 8px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }
    .slot-btn:active { transform: scale(0.96); }
    .slot-btn.selected {
      border-color: var(--brand);
      background: var(--brand);
      color: white;
    }
    .slot-btn.full {
      opacity: 0.4;
      pointer-events: none;
      text-decoration: line-through;
    }
    .slot-btn .slot-avail {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .slot-btn.selected .slot-avail { color: rgba(255,255,255,0.7); }

    /* ========== FORM ========== */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--brand);
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--text);
      background: var(--bg-card);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--brand);
    }
    .form-group input::placeholder { color: var(--text-muted); }

    /* ========== SUMMARY ========== */
    .summary-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
    }
    .summary-row + .summary-row { border-top: 1px solid var(--border); }
    .summary-row .label { color: var(--text-muted); }
    .summary-row .value { font-weight: 600; }
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0 0;
      border-top: 2px solid var(--brand);
      margin-top: 8px;
      font-size: 18px;
      font-weight: 700;
      color: var(--brand);
    }

    /* ========== CONFIRMATION ========== */
    .confirmation {
      text-align: center;
      padding: 40px 0;
    }
    .confirmation-check {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--success-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    .confirmation h2 {
      font-family: var(--font-display);
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--brand);
    }
    .confirmation p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .order-number-display {
      display: inline-block;
      background: #f9f0ef;
      color: var(--brand);
      font-size: 32px;
      font-weight: 700;
      padding: 12px 32px;
      border-radius: var(--radius);
      margin: 20px 0;
      letter-spacing: 2px;
    }

    /* ========== BUTTONS ========== */
    .btn-primary {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      -webkit-appearance: none;
      letter-spacing: 0.3px;
    }
    .btn-primary.ready {
      background: var(--brand);
    }
    .btn-primary.ready:hover { background: #7a1c1e; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled {
      background: var(--accent);
      opacity: 0.5;
      pointer-events: none;
    }

    .btn-back {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--brand);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .btn-back:active { transform: scale(0.98); }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
    }

    /* ========== BOTTOM BAR ========== */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .bottom-bar .total {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 80px;
    }
    .bottom-bar .total strong {
      display: block;
      font-size: 18px;
      color: var(--brand);
    }
    .bottom-bar .btn-primary {
      flex: 1;
      padding: 12px 0;
      font-size: 14px;
    }
    .bottom-bar .btn-back {
      flex: 1;
      padding: 12px 0;
      font-size: 14px;
    }

    /* ========== LOADING ========== */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== ERROR ========== */
    .error-msg {
      background: #FDE8E8;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>

  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <img src="logo%20v3.png" alt="MARUOKO — Hiroshima Cuisine" class="header-logo">
    </div>

    <!-- STEPPER -->
    <div class="stepper" id="stepper">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>

    <!-- ERROR -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- LOADING -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>A carregar o menu...</p>
    </div>

    <!-- STEP 1: MENU -->
    <div class="section" id="step1">
      <div class="section-title">O que vais querer?</div>
      <div class="section-subtitle">Escolhe os teus pratos</div>
      <div id="menuList"></div>
      <div style="text-align:center; padding:6px 0 0; margin-bottom:-10px;">
        <img src="Sans%20titre%20(315%20x%20250%20px).png" alt="Mascotte Maruoko" style="width:140px; height:auto;">
      </div>
    </div>

    <!-- STEP 2: TIME SLOT -->
    <div class="section" id="step2">
      <div class="section-title">A que horas vens?</div>
      <div class="section-subtitle">Escolhe o teu horário de recolha</div>
      <div class="slots-grid" id="slotsGrid"></div>
    </div>

    <!-- STEP 3: INFO + CONFIRM -->
    <div class="section" id="step3">
      <div class="section-title">Quase lá!</div>
      <div class="section-subtitle">O teu nome e telefone para confirmar</div>

      <div class="form-group">
        <label for="customerName">Nome</label>
        <input type="text" id="customerName" placeholder="O teu nome" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="customerPhone">Telemóvel</label>
        <input type="tel" id="customerPhone" placeholder="+351 ..." autocomplete="tel">
      </div>

      <div class="summary-card" id="orderSummary"></div>

      <button class="btn-primary" id="btnConfirm" onclick="submitOrder()">
        Confirmar reserva
      </button>
    </div>

    <!-- STEP 4: CONFIRMATION -->
    <div class="section" id="step4">
      <div class="confirmation">
        <div class="confirmation-check">✓</div>
        <h2>Reserva confirmada!</h2>
        <p>Apresenta este número quando chegares</p>
        <div class="order-number-display" id="confirmOrderNumber">—</div>
        <div class="summary-card" id="confirmSummary"></div>
        <button class="btn-secondary" onclick="resetApp()">Nova reserva</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR (steps 1-2) -->
  <div class="bottom-bar" id="bottomBar" style="display:none;">
    <button class="btn-back" id="btnBack" onclick="prevStep()" style="display:none;">Voltar</button>
    <div class="total" id="totalWrap">
      Total<br>
      <strong id="totalDisplay">€0.00</strong>
    </div>
    <button class="btn-primary" id="btnNext" disabled onclick="nextStep()">
      Seguinte →
    </button>
  </div>

<script>
// ============================================
// CONFIG — replace with your Supabase project
// ============================================
const SUPABASE_URL = 'https://onkgxuxxrquhaqcthazv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2d4dXh4cnF1aGFxY3RoYXp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Nzc1MzUsImV4cCI6MjA5MDM1MzUzNX0.utp7mAJQaUP06PnbF9RgEH_oAqhOdl3OyQYBpwmCyvs';

// Handle different CDN export styles
const _sb = window.supabase || window.Supabase;
if (!_sb || !_sb.createClient) {
  document.getElementById('loadingState').innerHTML = '<p style="color:red;">Erro: biblioteca Supabase não carregou. Recarrega a página.</p>';
  throw new Error('Supabase CDN failed to load');
}
const supabase = _sb.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================
// STATE
// ============================================
let menuItems = [];
let slots = [];
let cart = {};           // { itemId: quantity }
let selectedSlot = null;
let currentStep = 1;

// ============================================
// INIT
// ============================================
async function init() {
  try {
    // Load menu
    const { data: menu, error: menuErr } = await supabase
      .from('menu_items')
      .select('*')
      .eq('available', true)
      .order('position');
    
    if (menuErr) throw menuErr;
    menuItems = menu || [];

    // Load slot availability for today
    const today = new Date().toISOString().split('T')[0];
    const { data: slotData, error: slotErr } = await supabase
      .rpc('get_slot_availability', { target_date: today });
    
    if (slotErr) throw slotErr;
    slots = slotData || [];

    renderMenu();
    renderSlots();
    showStep(1);
    document.getElementById('loadingState').style.display = 'none';
  } catch (err) {
    console.error('Init error:', err);
    document.getElementById('loadingState').style.display = 'none';
    showError('Erro ao carregar. Tenta de novo.');
  }
}

// ============================================
// RENDERING
// ============================================
function getCategory(item) {
  const n = item.name.toLowerCase();
  if (n.includes('okonomiyaki')) return 'Okonomiyaki';
  if (n.includes('topping')) return 'Toppings';
  if (n.includes('mochi')) return 'Dessert';
  return 'Drinks';
}

function renderMenu() {
  const list = document.getElementById('menuList');
  let html = '';
  let lastCat = '';

  menuItems.forEach(item => {
    const cat = getCategory(item);
    if (cat !== lastCat) {
      html += `<div class="menu-category">${cat}</div>`;
      lastCat = cat;
    }
    html += `
      <div class="menu-item" id="item-${item.id}" data-id="${item.id}">
        <div class="menu-item-top">
          <span class="menu-item-name">${item.name}</span>
          <span class="menu-item-price">€${item.price.toFixed(2)}</span>
        </div>
        ${item.description ? `<div class="menu-item-desc">${item.description}</div>` : ''}
        <div class="qty-control">
          <button class="qty-btn minus" onclick="changeQty('${item.id}', -1)">−</button>
          <span class="qty-value" id="qty-${item.id}">0</span>
          <button class="qty-btn plus" onclick="changeQty('${item.id}', 1)">+</button>
        </div>
      </div>`;
  });

  list.innerHTML = html;
}

function renderSlots() {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = slots.map(slot => {
    const remaining = slot.max_orders - slot.current_orders;
    const isFull = remaining <= 0;
    return `
      <button 
        class="slot-btn ${isFull ? 'full' : ''} ${selectedSlot === slot.slot_time ? 'selected' : ''}"
        onclick="selectSlot('${slot.slot_time}')"
        ${isFull ? 'disabled' : ''}>
        ${slot.slot_time}
        <span class="slot-avail">${isFull ? 'Esgotado' : remaining + ' vaga' + (remaining > 1 ? 's' : '')}</span>
      </button>
    `;
  }).join('');
}

function renderSummary(targetId) {
  const container = document.getElementById(targetId);
  const items = Object.entries(cart)
    .filter(([_, qty]) => qty > 0)
    .map(([id, qty]) => {
      const item = menuItems.find(m => m.id === id);
      return { ...item, qty };
    });

  let html = items.map(item => `
    <div class="summary-row">
      <span class="label">${item.qty}× ${item.name}</span>
      <span class="value">€${(item.price * item.qty).toFixed(2)}</span>
    </div>
  `).join('');

  html += `
    <div class="summary-row">
      <span class="label">⏰ Horário</span>
      <span class="value">${selectedSlot || '—'}</span>
    </div>
    <div class="summary-total">
      <span>Total</span>
      <span>€${getTotal().toFixed(2)}</span>
    </div>
  `;

  container.innerHTML = html;
}

// ============================================
// INTERACTIONS
// ============================================
function changeQty(itemId, delta) {
  const current = cart[itemId] || 0;
  const next = Math.max(0, current + delta);
  cart[itemId] = next;

  // Update display
  document.getElementById(`qty-${itemId}`).textContent = next;

  // Toggle selected state
  const el = document.getElementById(`item-${itemId}`);
  el.classList.toggle('selected', next > 0);

  // Toggle minus button active state
  const minus = el.querySelector('.minus');
  minus.classList.toggle('active', next > 0);

  updateBottomBar();
}

function selectSlot(time) {
  selectedSlot = time;
  renderSlots();
  updateBottomBar();
}

function getTotal() {
  return Object.entries(cart).reduce((sum, [id, qty]) => {
    const item = menuItems.find(m => m.id === id);
    return sum + (item ? item.price * qty : 0);
  }, 0);
}

function getItemCount() {
  return Object.values(cart).reduce((s, q) => s + q, 0);
}

function updateBottomBar() {
  const total = getTotal();
  document.getElementById('totalDisplay').textContent = `€${total.toFixed(2)}`;

  const btnNext = document.getElementById('btnNext');
  const btnBack = document.getElementById('btnBack');

  const totalEl = document.getElementById('totalWrap');

  // Show back button on step 2+, hide total on step 2
  btnBack.style.display = currentStep > 1 ? 'flex' : 'none';
  totalEl.style.display = currentStep === 1 ? 'block' : 'none';

  if (currentStep === 1) {
    const hasItems = getItemCount() > 0;
    btnNext.disabled = !hasItems;
    btnNext.classList.toggle('ready', hasItems);
    btnNext.textContent = 'Escolher horário';
  } else if (currentStep === 2) {
    const hasSlot = !!selectedSlot;
    btnNext.disabled = !hasSlot;
    btnNext.classList.toggle('ready', hasSlot);
    btnNext.textContent = 'Seguinte';
  }
}

// ============================================
// NAVIGATION
// ============================================
function showStep(step) {
  currentStep = step;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`step${step}`).classList.add('active');

  // Update stepper dots
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.className = 'step-dot';
    if (i + 1 === step) dot.classList.add('active');
    else if (i + 1 < step) dot.classList.add('done');
  });

  // Bottom bar visibility
  const bar = document.getElementById('bottomBar');
  bar.style.display = (step <= 2) ? 'flex' : 'none';

  updateBottomBar();

  if (step === 3) renderSummary('orderSummary');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextStep() {
  if (currentStep === 1 && getItemCount() > 0) showStep(2);
  else if (currentStep === 2 && selectedSlot) showStep(3);
}

function prevStep() {
  if (currentStep > 1) showStep(currentStep - 1);
}

// ============================================
// SUBMIT ORDER
// ============================================
async function submitOrder() {
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();

  if (!name || !phone) {
    showError('Preenche o teu nome e telemóvel');
    return;
  }

  const btn = document.getElementById('btnConfirm');
  btn.disabled = true;
  btn.textContent = 'A enviar...';
  hideError();

  try {
    const today = new Date().toISOString().split('T')[0];
    const total = getTotal();

    // Insert order
    const { data: order, error: orderErr } = await supabase
      .from('orders')
      .insert({
        customer_name: name,
        customer_phone: phone,
        slot_time: selectedSlot,
        slot_date: today,
        total_amount: total,
        status: 'pending'
      })
      .select('id, order_number')
      .single();

    if (orderErr) throw orderErr;

    // Insert order items
    const items = Object.entries(cart)
      .filter(([_, qty]) => qty > 0)
      .map(([id, qty]) => {
        const item = menuItems.find(m => m.id === id);
        return {
          order_id: order.id,
          menu_item_id: id,
          item_name: item.name,
          item_price: item.price,
          quantity: qty
        };
      });

    const { error: itemsErr } = await supabase
      .from('order_items')
      .insert(items);

    if (itemsErr) throw itemsErr;

    // Show confirmation
    document.getElementById('confirmOrderNumber').textContent = `#${String(order.order_number).padStart(3, '0')}`;
    renderSummary('confirmSummary');
    showStep(4);

  } catch (err) {
    console.error('Submit error:', err);
    showError('Erro ao enviar. Tenta de novo.');
    btn.disabled = false;
    btn.textContent = 'Confirmar reserva';
  }
}

// ============================================
// UTILS
// ============================================
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function resetApp() {
  cart = {};
  selectedSlot = null;
  init();
}

// ============================================
// GO
// ============================================
init();
</script>
